services:
  app1:
    restart: always
    build: .
    container_name: app1
    expose:
      - '3000'
    networks:
      - backend

  app2:
    restart: always
    build: .
    container_name: app2
    expose:
      - '3000'
    networks:
      - backend

  app3:
    restart: always
    build: .
    container_name: app3
    expose:
      - '3000'
    networks:
      - backend

  nginx:
    restart: always
    image: nginx:latest
    container_name: nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - backend

networks:
  backend:
