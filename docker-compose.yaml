services:
  app1:
    build: .
    container_name: app1
    expose:
      - '3000'
    networks:
      - backend

  app2:
    build: .
    container_name: app2
    expose:
      - '3000'
    networks:
      - backend

  app3:
    build: .
    container_name: app3
    expose:
      - '3000'
    networks:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:
